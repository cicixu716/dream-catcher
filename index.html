<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🌙 Dream Weaver 2003</title>
    <style>
        :root { --pink: #ff71ce; --cyan: #01cdfe; --yellow: #fffb96; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: monospace; cursor: grab; }
        body:active { cursor: grabbing; }
        #mood-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 40%; height: 4px; display: flex; opacity: 0.6; border: 1px solid #444; }
        .mood-segment { height: 100%; transition: width 0.4s; }
        #stage { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 2000; color: #fff; padding: 40px; }
        #ai-txt { max-width: 600px; line-height: 1.8; font-size: 1.2rem; color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
        #tag { color: var(--pink); margin-bottom: 20px; font-size: 0.8rem; letter-spacing: 2px; border-bottom: 1px solid var(--pink); }
        /* 强震动 */
        .collapse { animation: shake 0.1s infinite; filter: invert(1) contrast(10) hue-rotate(180deg)!important; }
        @keyframes shake {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(-25px, 15px) rotate(-3deg); }
            50% { transform: translate(25px, -15px) rotate(3deg); }
            75% { transform: translate(-30px, -10px) rotate(1deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        .cursor { display: inline-block; width: 8px; height: 1.2rem; background: var(--cyan); margin-left:5px; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        #boot { position: fixed; inset: 0; background: #000; color: var(--cyan); padding: 40px; z-index: 9999; }
        #btn { margin-top:20px; color:#fff; cursor:pointer; display:none; border:1px solid #fff; padding: 5px; width: fit-content; }
    </style>
</head>
<body>
    <div id="boot"><div id="log"></div><div id="btn">[ INITIALIZE ]</div></div>
    <div id="mood-ui">
        <div id="seg-b" class="mood-segment"></div>
        <div id="seg-r" class="mood-segment"></div>
        <div id="seg-g" class="mood-segment"></div>
    </div>
    <div id="stage"><div id="tag"></div><div id="ai-txt"></div></div>
    <canvas id="cvs"></canvas>

<script>
const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let frags = [], pts = [], paused = true, mouse = { x: -100, y: -100 }, mood = { b: 0, r: 0, g: 0, t: 0 };

function upUI() {
    const t = Math.max(1, mood.t);
    document.getElementById('seg-b').style.width = (mood.b/t*100) + "%";
    document.getElementById('seg-r').style.width = (mood.r/t*100) + "%";
    document.getElementById('seg-g').style.width = (mood.g/t*100) + "%";
    document.getElementById('seg-b').style.background = 'var(--cyan)';
    document.getElementById('seg-r').style.background = 'var(--pink)';
    document.getElementById('seg-g').style.background = 'var(--yellow)';
}

async function doCollapse() {
    paused = true; cvs.classList.add('collapse');
    let r = mood.r > mood.b ? "ANALYSIS: 焦虑过载" : "ANALYSIS: 潜意识溢出";
    
    // 震动时间减半为 1000ms (1s)
    setTimeout(async () => {
        cvs.classList.remove('collapse');
        document.getElementById('stage').style.display = 'flex';
        document.getElementById('tag').innerText = r;
        
        // 核心：调用 AI 并启动打字机
        const text = await getAI();
        type(text);
    }, 1000); 
}

async function getAI() {
    try {
        const res = await fetch("https://dream-catcher-ai.changxu0716.workers.dev/", {
            method: "POST",
            body: JSON.stringify({ moodData: mood })
        });
        const d = await res.json();
        return d.choices[0].message.content;
    } catch (e) {
        return "梦境协议断开。你在2003年的静谧中醒来，记忆正如潮水般退去。";
    }
}

function type(t) {
    const box = document.getElementById('ai-txt');
    let i = 0;
    const interval = setInterval(() => {
        if (i < t.length) {
            box.innerHTML = t.substring(0, i + 1) + '<span class="cursor"></span>';
            i++;
        } else {
            clearInterval(interval);
            box.innerHTML = t + '<br><br><small style="color:var(--pink);cursor:pointer;border:1px solid var(--pink);padding:3px" onclick="location.reload()">[ 重构意识 ]</small>';
        }
    }, 50); // 打字机速度
}

class Pt {
    constructor(x, y, c) { this.x = x; this.y = y; this.c = c; this.vx = (Math.random()-0.5)*15; this.vy = (Math.random()-0.5)*15; this.a = 1; }
    up() { this.x += this.vx; this.y += this.vy; this.a -= 0.03; }
    dr() { ctx.globalAlpha = this.a; ctx.fillStyle = this.c; ctx.fillRect(this.x, this.y, 2, 2); ctx.globalAlpha = 1; }
}

class Frag {
    constructor() { this.reset(); }
    reset() {
        const ts = ['b', 'r', 'g']; this.type = ts[Math.floor(Math.random() * 3)];
        this.x = Math.random() * cvs.width; this.y = Math.random() * cvs.height;
        this.vx = (Math.random() - 0.5) * 5; this.vy = (Math.random() - 0.5) * 5;
    }
    up() {
        if(paused) return;
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > cvs.width) this.vx *= -1;
        if (this.y < 0 || this.y > cvs.height) this.vy *= -1;
        if (Math.hypot(this.x - mouse.x, this.y - mouse.y) < 45) {
            for(let i=0; i<15; i++) pts.push(new Pt(this.x, this.y, this.getCol()));
            mood[this.type]++; mood.t++; upUI();
            if (mood.t >= 10) doCollapse(); // 抓满10个就崩塌
            this.reset();
        }
    }
    getCol() { return {b:'#01cdfe', r:'#ff71ce', g:'#fffb96'}[this.type]; }
    dr() {
        ctx.save(); ctx.translate(this.x, this.y); ctx.fillStyle = this.getCol();
        ctx.shadowBlur = 15; ctx.shadowColor = this.getCol();
        if(this.type === 'b') { ctx.beginPath(); ctx.moveTo(0,-15); ctx.bezierCurveTo(15,0,15,15,0,15); ctx.bezierCurveTo(-15,15,-15,0,0,-15); ctx.fill(); }
        else if(this.type === 'g') { ctx.beginPath(); for(let i=0; i<5; i++){ ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*15, Math.sin((18+i*72)*Math.PI/180)*15); ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*7, Math.sin((54+i*72)*Math.PI/180)*7); } ctx.fill(); }
        else { ctx.rotate(Date.now()*0.005); ctx.fillRect(-8,-8,16,16); }
        ctx.restore();
    }
}

function loop() {
    ctx.fillStyle = 'rgba(10,10,30,0.4)'; ctx.fillRect(0,0,cvs.width,cvs.height);
    if (!paused) { 
        frags.forEach(f => { f.up(); f.dr(); }); 
        pts.forEach((p, i) => { p.up(); p.dr(); if(p.a<=0) pts.splice(i, 1); }); 
    }
    requestAnimationFrame(loop);
}

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
const logs = ["初始化协议...", "同步潜意识...", "WEAVER READY."];
const lBox = document.getElementById('log');
(async () => {
    for (let l of logs) { 
        let p = document.createElement('div'); p.textContent = "> " + l; 
        lBox.appendChild(p); await new Promise(r => setTimeout(r, 400)); 
    }
    document.getElementById('btn').style.display = 'block';
})();

document.getElementById('btn').onclick = () => {
    document.getElementById('boot').style.display = 'none';
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    for(let i=0; i<12; i++) frags.push(new Frag());
    paused = false; upUI(); loop();
};
</script>
</body>
</html>
