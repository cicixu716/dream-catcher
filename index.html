<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🌙 Dream Catcher 2003: Deep Sleep</title>
    <style>
        :root { --pink: #ff71ce; --cyan: #01cdfe; --purple: #b967ff; --yellow: #fffb96; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: "MS Sans Serif", monospace; }
        
        /* 启动界面 */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: var(--cyan); padding: 40px; z-index: 9999;
            display: flex; flex-direction: column; font-size: 13px;
        }
        #boot-prompt { margin-top:20px; color:#fff; cursor:pointer; display:none; border:1px solid #fff; width: fit-content; padding: 5px 10px;}

        /* VHS 效果叠加层 */
        .vhs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 2px);
            pointer-events: none; z-index: 10;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%);
            pointer-events: none; z-index: 11;
        }

        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            text-shadow: 2px 2px var(--pink); z-index: 100; font-size: 18px;
        }

        /* 梦境全屏 */
        .dream-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(10, 10, 30, 0.9); z-index: 2000; color: white; padding: 40px;
            backdrop-filter: blur(8px); text-align: center;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <div id="boot-log"></div>
    <div id="boot-prompt">[ INITIALIZE CONSCIOUSNESS ]</div>
</div>

<div id="ui">SYSTEM_LOG: <span id="score">0000</span></div>
<div class="vhs"></div>
<div class="vignette"></div>
<canvas id="gameCanvas"></canvas>

<script>
// --- 1. 基础变量与配置 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score = 0, fragments = [], particles = [], trail = [];
let isPaused = true, mouse = { x: -100, y: -100 };
const mood = { blue: 0, red: 0, gold: 0, total: 0 };

// --- 2. 新增：蒸汽波音乐逻辑 (Oscillator 版) ---
let audioCtx;
function playDreamMusic() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(110, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        // 模拟低保真波动的音调
        setInterval(() => {
            osc.frequency.exponentialRampToValueAtTime(Math.random() * 10 + 105, audioCtx.currentTime + 2);
        }, 2000);
    }
}

// --- 3. 新增：崩塌抖动触发器 ---
function triggerCollapseEffect() {
    canvas.classList.add('collapse-active');
    setTimeout(() => canvas.classList.remove('collapse-active'), 500);
}

// --- 4. 叙事与逻辑类 (Narrative, Particle, Fragment) ---
const Narrative = {
    logs: ["LOADING VIRTUAL_DREAM...", "MEM_ADDR: 0x002003", "STATUS: UNSTABLE"],
    async start() {
        const logBox = document.getElementById('boot-log');
        for (let line of this.logs) {
            let p = document.createElement('div'); p.textContent = `> ${line}`;
            logBox.appendChild(p); await new Promise(r => setTimeout(r, 400));
        }
        document.getElementById('boot-prompt').style.display = 'block';
    },
    show(text) {
        const div = document.createElement('div'); div.className = 'narrative-text';
        div.textContent = text; document.body.appendChild(div);
        setTimeout(() => div.remove(), 4000);
    }
};

class Particle { /* ... 保持之前的粒子类代码不变 ... */ 
    constructor(x, y, color, size = 2) {
        this.x = x; this.y = y; this.color = color;
        this.size = Math.random() * size + 1;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.alpha = 1;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.02; }
    draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); ctx.globalAlpha = 1; }
}

class Fragment { /* ... 保持之前的碎片类代码不变 ... */ 
    constructor() { this.reset(); }
    reset() {
        const types = ['blue', 'red', 'gold'];
        this.type = types[Math.floor(Math.random() * types.length)];
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.size = 15; this.age = 0; this.isBoss = false;
    }
    update() {
        this.x += this.vx; this.y += this.vy; this.age++;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        if (Math.hypot(this.x - mouse.x, this.y - mouse.y) < 30) this.explode();
        if (this.type === 'red' && this.age > 600) {
            this.isBoss = true;
            this.x += (mouse.x - this.x) * 0.01;
            this.y += (mouse.y - this.y) * 0.01;
        }
    }
    explode() {
        for(let i=0; i<12; i++) particles.push(new Particle(this.x, this.y, this.getColor()));
        if(this.isBoss) {
            score = Math.max(0, score - 100);
            triggerCollapseEffect(); // 调用抖动
            Narrative.show("核心受损：焦虑侵蚀。");
        } else {
            score += 10;
        }
        mood[this.type]++; mood.total++;
        document.getElementById('score').innerText = score.toString().padStart(4, '0');
        if (mood.total % 10 === 0) triggerAISynthesis();
        this.reset();
    }
    getColor() { return {blue: '#01cdfe', red: '#ff71ce', gold: '#fffb96'}[this.type]; }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle = this.isBoss ? "#000" : this.getColor();
        ctx.shadowBlur = 10; ctx.shadowColor = this.getColor();
        if (this.type === 'blue') { /* 绘制水滴... */ 
            ctx.beginPath(); ctx.moveTo(0, -this.size); ctx.bezierCurveTo(this.size, 0, this.size, this.size, 0, this.size); ctx.bezierCurveTo(-this.size, this.size, -this.size, 0, 0, -this.size); ctx.fill();
        } else if (this.type === 'gold') { /* 绘制星星... */ 
            ctx.beginPath(); for(let i=0; i<5; i++) { ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*this.size, Math.sin((18+i*72)*Math.PI/180)*this.size); ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*(this.size/2), Math.sin((54+i*72)*Math.PI/180)*(this.size/2)); } ctx.closePath(); ctx.fill();
        } else { /* 绘制方块... */ 
            ctx.rotate(this.age * 0.05); ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        }
        ctx.restore();
    }
}

// --- 5. 事件与动画循环 ---
async function triggerAISynthesis() {
    isPaused = true;
    const dominant = Object.keys(mood).reduce((a, b) => b === 'total' ? a : (mood[a] > mood[b] ? a : b));
    // 模拟 AI 文本
    const lib = { blue: "1999：内存溢出...", red: "警告：系统反噬...", gold: "清醒：管理员权限..." };
    const overlay = document.createElement('div');
    overlay.className = 'dream-overlay';
    overlay.innerHTML = `<h1 style="color:var(--cyan)">DREAM_SYNC</h1><p>${lib[dominant]}</p><p>[ 点击继续同步 ]</p>`;
    document.body.appendChild(overlay);
    overlay.onclick = () => { overlay.remove(); isPaused = false; };
}

function animate() {
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#3d1054');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!isPaused) {
        trail.push({x: mouse.x, y: mouse.y, alpha: 1});
        if (trail.length > 20) trail.shift();
        trail.forEach((t) => { t.alpha -= 0.05; ctx.fillStyle = `rgba(255, 255, 255, ${t.alpha * 0.2})`; ctx.fillRect(t.x-2, t.y-2, 4, 4); });
        fragments.forEach(f => { f.update(); f.draw(); });
        particles.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) particles.splice(i, 1); });
    }
    requestAnimationFrame(animate);
}

// --- 6. 最终入口 ---
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
document.getElementById('boot-prompt').onclick = () => {
    playDreamMusic(); // 启动音乐
    document.getElementById('boot-screen').style.display = 'none';
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    for(let i=0; i<15; i++) fragments.push(new Fragment());
    isPaused = false;
};

Narrative.start();
animate();
</script>
</body>
</html>
